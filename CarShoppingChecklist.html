// ── Helpers ───────────────────────────────────────────────────────────────────
function StarRating({value, onChange}) {
  return <div style={{display:"flex",gap:2}}>
    {[1,2,3,4,5].map(n=>(
      <button key={n} onClick={()=>onChange(n===value?0:n)}
        style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:"0 1px",lineHeight:1,
          color:n<=value?"#e8a020":"#ccc"}}>★</button>
    ))}
  </div>;
}

function progressBar(pct, style={}) {
  return <div style={{background:n100,borderRadius:4,height:6,overflow:"hidden",flex:1,...style}}>
    <div style={{width:pct+"%",background:pct===100?G:AM,height:"100%",borderRadius:4}}/>
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [activeTab,       setActiveTab]       = useState("vehicle");
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [selectedDealer,  setSelectedDealer]  = useState(null);
  const [compareA,        setCompareA]        = useState(null);
  const [compareB,        setCompareB]        = useState(null);
  const [showCurrent,     setShowCurrent]     = useState(false);
  const [brandFilter,     setBrandFilter]     = useState("All");
  const [checks,          setChecks]          = useState({});
  const [notes,           setNotes]           = useState({});
  const [ratings,         setRatings]         = useState({});
  const [dealerChecks,    setDealerChecks]    = useState({});
  const [dealerNotes,     setDealerNotes]     = useState({});
  const [dealerRatings,   setDealerRatings]   = useState({});
  const [openSections,    setOpenSections]    = useState({});
  const [toast,           setToast]           = useState(null);
  const fileInputRef = useRef(null);
  const APP_VERSION  = "1.3";

  const VEHICLE_SECTIONS = SECTIONS.filter(s=>s.id!=="dealer_service");
  const DEALER_SECTIONS  = SECTIONS.filter(s=>s.id==="dealer_service");

  const showToast = (msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3500); };
  const toggleCheck=(key,setFn,map)=>setFn({...map,[key]:!map[key]});
  const setNote=(key,val,setFn,map)=>setFn({...map,[key]:val});
  const setRating=(key,val,setFn,map)=>setFn({...map,[key]:val});

  const sectionProgress=(entity,section,checkMap)=>{
    const prefix=entity+"|"+section.id+"|";
    const total=section.items.length;
    const done=section.items.filter(it=>checkMap[prefix+it.id]).length;
    return {done,total,pct:total?Math.round(done/total*100):0};
  };
  const overallProgress=(entity,checkMap,sectionList)=>{
    let total=0,done=0;
    sectionList.forEach(sec=>sec.items.forEach(it=>{
      total++;
      if(checkMap[entity+"|"+sec.id+"|"+it.id]) done++;
    }));
    return {done,total,pct:total?Math.round(done/total*100):0};
  };
  const starStr=n=>n>0?"★".repeat(n)+"☆".repeat(5-n):"—";

  // ── Save / Load ─────────────────────────────────────────────────────────────
  const handleSave=()=>{
    try{
      const data={_version:APP_VERSION,_saved:new Date().toISOString(),
        checks,notes,ratings,dealerChecks,dealerNotes,dealerRatings,openSections,
        selectedVehicleId:selectedVehicle?.id??null,selectedDealerId:selectedDealer?.id??null,
        compareAId:compareA?.id??null,compareBId:compareB?.id??null,showCurrent};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const ts=new Date().toISOString().slice(0,16).replace("T","_").replace(":","");
      const a=document.createElement("a");
      a.href=url;a.download=`CarChecklist_${ts}.json`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      showToast("✅ Saved! Tap 'Save to Files' in the share sheet.");
    }catch(e){showToast("❌ Save failed: "+e.message,"err");}
  };

  const handleLoad=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data._version)throw new Error("Not a valid checklist file.");
        if(data.checks)        setChecks(data.checks);
        if(data.notes)         setNotes(data.notes);
        if(data.ratings)       setRatings(data.ratings);
        if(data.dealerChecks)  setDealerChecks(data.dealerChecks);
        if(data.dealerNotes)   setDealerNotes(data.dealerNotes);
        if(data.dealerRatings) setDealerRatings(data.dealerRatings);
        if(data.openSections)  setOpenSections(data.openSections);
        if(data.showCurrent!==undefined) setShowCurrent(data.showCurrent);
        if(data.selectedVehicleId){const v=VEHICLES.find(v=>v.id===data.selectedVehicleId);if(v)setSelectedVehicle(v);}
        if(data.selectedDealerId) {const d=DEALERS.find(d=>d.id===data.selectedDealerId);  if(d)setSelectedDealer(d);}
        if(data.compareAId){const v=VEHICLES.find(v=>v.id===data.compareAId);if(v)setCompareA(v);}
        if(data.compareBId){const v=VEHICLES.find(v=>v.id===data.compareBId);if(v)setCompareB(v);}
        showToast("✅ Loaded: "+(data._saved?new Date(data._saved).toLocaleString():"unknown date"));
      }catch(err){showToast("❌ Load failed: "+err.message,"err");}
    };
    reader.readAsText(file);e.target.value="";
  };

  // ── Print helpers ────────────────────────────────────────────────────────────
  // All print output is landscape letter. The print window auto-triggers the
  // browser print dialog — on iPhone Safari choose "Save as PDF"; on desktop
  // choose "Save as PDF" / "Microsoft Print to PDF" for a portable file.
  // The PDF tip banner at top of each print window reminds you of this.

  const PDF_TIP = `<div class="pdf-tip" style="background:#1a6b3c;color:#fff;padding:7px 12px;
    font-size:8.5pt;font-weight:600;margin-bottom:8px;border-radius:3px;display:flex;
    align-items:center;gap:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact;">
    📄 To save as PDF: <span style="opacity:0.85;font-weight:400;">
    iPhone Safari → Share → Print → Pinch-zoom thumbnail → Share → Save to Files &nbsp;|&nbsp;
    Desktop → Print → Destination: Save as PDF</span></div>`;

  // Shared print CSS injected into every print window
  const PRINT_CSS = `
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#fff;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;}
    @page{size:letter landscape;margin:0.3in;}
    .pdf-tip{display:none;}
    @media screen{.pdf-tip{display:flex;}}
    .print-page{page-break-after:always;break-after:page;}
    .print-page:last-child{page-break-after:avoid;break-after:avoid;}
    /* header */
    .print-header{background:#1c1b18!important;color:#fff!important;
      padding:6px 10px;margin-bottom:5px;border-left:4px solid #1a6b3c;}
    .print-header-title{font-size:10.5pt;font-weight:700;}
    .print-header-sub{font-size:6.5pt;color:#bbb;margin-top:1px;}
    /* vehicle 3-col */
    .print-three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
    /* dealer 2-col */
    .print-two-col{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
    /* shared section/item */
    .print-section{margin-bottom:3px;border:1px solid #ddd;border-radius:2px;
      overflow:hidden;break-inside:avoid;}
    .print-section-header{background:#f0f0ee!important;padding:2px 7px;font-weight:700;
      font-size:7.5pt;display:flex;justify-content:space-between;}
    .print-item{display:flex;align-items:flex-start;gap:4px;padding:1.5px 7px;
      border-top:1px solid #eee;font-size:6.5pt;line-height:1.25;}
    .print-check{width:8px;height:8px;border:1.5px solid #777;border-radius:1px;
      flex-shrink:0;margin-top:1px;background:#fff;display:inline-block;}
    .print-check.checked{background:#1a6b3c!important;border-color:#1a6b3c!important;}
    .print-note{font-size:6.5pt;color:#555;font-style:italic;
      padding:1px 7px 2px 20px;border-top:1px dashed #eee;}
    .print-rating-row{padding:1.5px 7px 3px;font-size:6.5pt;color:#555;
      border-top:1px dashed #eee;display:flex;gap:5px;align-items:center;}
    .print-stars{color:#c47f00!important;}
    .print-dealer-meta{font-size:7pt;color:#555;padding:2px 9px 4px;}
    /* compare grids */
    .print-cmp-wrap{border:1px solid #ccc;border-radius:3px;overflow:hidden;font-size:6.5pt;}
    .print-cmp2{display:grid;grid-template-columns:175px 1fr 1fr;}
    .print-cmp3{display:grid;grid-template-columns:155px 1fr 1fr 1fr;}
    .print-cmp-head{background:#1c1b18!important;color:#fff!important;
      padding:4px 7px;font-weight:700;font-size:8pt;}
    .print-cmp-section{background:#dde8dd!important;padding:2px 7px;font-weight:700;
      font-size:7pt;border-top:1px solid #aaa;grid-column:1/-1;}
    .print-cmp-label{padding:2px 6px;border-top:1px solid #eee;
      color:#3a3830;line-height:1.25;border-right:1px solid #eee;}
    .print-cmp-cell{padding:2px 6px;border-top:1px solid #eee;
      line-height:1.25;border-right:1px solid #eee;}
    .print-cmp-cell:last-child{border-right:none;}
    .print-cmp-cell.ck{color:#1a6b3c;font-weight:700;}
    .print-cmp-cell.unc{color:#bbb;}
    .print-cmp-note{font-style:italic;color:#666;font-size:6pt;}
    .print-cmp-diff{background:#fffbea!important;}
  `;

  const openPrintWin=(title,body)=>{
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
      <style>${PRINT_CSS}</style></head>
      <body>${PDF_TIP}${body}</body></html>`);
    win.document.close();win.focus();
    // Slight delay lets Safari render before triggering print dialog
    setTimeout(()=>win.print(),600);
  };

  // ── Vehicles: landscape, 3 columns, target 1 page per vehicle ──────────────
  // 8 sections split as 3 / 3 / 2 across three columns.
  // At 6.5pt with ~7.8" usable height on landscape letter this fits comfortably
  // for all vehicles without notes; notes push a section to a 2nd page only if
  // very long — acceptable since user controls note length.
  const buildVehiclePrintPages=()=>VEHICLES.map(v=>{
    const prog=overallProgress(v.id,checks,VEHICLE_SECTIONS);
    const secs=VEHICLE_SECTIONS.map(sec=>{
      const p=sectionProgress(v.id,sec,checks);
      const r=ratings[v.id+"|"+sec.id]||0;
      const n=notes[v.id+"|"+sec.id]||"";
      const rows=sec.items.map(it=>{
        const ck=checks[v.id+"|"+sec.id+"|"+it.id]||false;
        return `<div class="print-item"><span class="print-check ${ck?"checked":""}"></span><span>${it.text}</span></div>`;
      }).join("");
      const ratingLine=r>0?`<div class="print-rating-row">Rating: <span class="print-stars">${starStr(r)}</span></div>`:"";
      return `<div class="print-section">
        <div class="print-section-header"><span>${sec.icon} ${sec.label}</span><span>${p.done}/${p.total}</span></div>
        ${rows}${ratingLine}${n?`<div class="print-note">Notes: ${n}</div>`:""}
      </div>`;
    });
    // Split 8 sections: col1=0-2, col2=3-5, col3=6-7
    return `<div class="print-page">
      <div class="print-header">
        <div class="print-header-title">${v.label}</div>
        <div class="print-header-sub">MSRP ${v.msrp} &nbsp;·&nbsp; ${prog.done}/${prog.total} items evaluated (${prog.pct}%) &nbsp;·&nbsp; Printed ${new Date().toLocaleDateString()}</div>
      </div>
      <div class="print-three-col">
        <div>${secs.slice(0,3).join("")}</div>
        <div>${secs.slice(3,6).join("")}</div>
        <div>${secs.slice(6).join("")}</div>
      </div>
    </div>`;
  }).join("");

  const printVehicles=()=>openPrintWin("Vehicle Checklists — Car Shopping 2026",buildVehiclePrintPages());

  // ── Dealers: landscape, 2 columns, 1 page per dealer ───────────────────────
  // dealer_service has 11 items — fits in 1 column at 6.5pt; 2 cols fills page.
  // We put the checklist in col1 and notes/rating in col2.
  const printDealers=()=>{
    const pages=DEALERS.map(d=>{
      const prog=overallProgress(d.id,dealerChecks,DEALER_SECTIONS);
      const overall_r=dealerRatings[d.id+"|overall"]||0;
      const overall_n=dealerNotes[d.id+"|overall"]||"";
      const secs=DEALER_SECTIONS.map(sec=>{
        const p=sectionProgress(d.id,sec,dealerChecks);
        const sr=dealerRatings[d.id+"|"+sec.id]||0;
        const sn=dealerNotes[d.id+"|"+sec.id]||"";
        const rows=sec.items.map(it=>{
          const ck=dealerChecks[d.id+"|"+sec.id+"|"+it.id]||false;
          return `<div class="print-item"><span class="print-check ${ck?"checked":""}"></span><span>${it.text}</span></div>`;
        }).join("");
        return `<div class="print-section">
          <div class="print-section-header"><span>${sec.icon} ${sec.label}</span><span>${p.done}/${p.total}${sr>0?" · "+starStr(sr):""}</span></div>
          ${rows}${sn?`<div class="print-note">Notes: ${sn}</div>`:""}
        </div>`;
      }).join("");
      // Right column: overall notes + rating + DR data
      const rightCol=`
        <div class="print-section">
          <div class="print-section-header">📋 Overall Notes &amp; Rating</div>
          ${overall_n?`<div class="print-note" style="padding:5px 8px;font-style:normal;font-size:7pt;">${overall_n}</div>`
            :`<div class="print-note">No notes recorded yet.</div>`}
          ${overall_r>0?`<div class="print-rating-row">Overall: <span class="print-stars">${starStr(overall_r)}</span></div>`:""}
        </div>
        <div class="print-section">
          <div class="print-section-header">📊 At a Glance</div>
          <div class="print-item"><span>Brand:</span>&nbsp;<strong>${d.brand}</strong></div>
          <div class="print-item"><span>Distance from Vernon:</span>&nbsp;${d.dist}</div>
          <div class="print-item"><span>Phone:</span>&nbsp;${d.phone}</div>
          <div class="print-item"><span>DealerRater:</span>&nbsp;${d.drRating} (${d.drReviews} reviews)</div>
          <div class="print-item"><span>Checklist completion:</span>&nbsp;${prog.done}/${prog.total} (${prog.pct}%)</div>
        </div>`;
      return `<div class="print-page">
        <div class="print-header">
          <div class="print-header-title">${d.label} — ${d.town}, CT</div>
          <div class="print-header-sub">${d.dist} from Vernon &nbsp;·&nbsp; ${d.phone} &nbsp;·&nbsp; DealerRater: ${d.drRating} (${d.drReviews} reviews) &nbsp;·&nbsp; Printed ${new Date().toLocaleDateString()}</div>
        </div>
        <div class="print-two-col">
          <div>${secs}</div>
          <div>${rightCol}</div>
        </div>
      </div>`;
    }).join("");
    openPrintWin("Dealer Checklists — Car Shopping 2026",pages);
  };

  // ── Comparison: landscape, page 1 = specs+ratings, page 2+ = checklist ─────
  const printComparison=(cols)=>{
    if(cols.filter(Boolean).length<2){showToast("Select at least two vehicles to compare.","err");return;}
    const vehicles=cols.filter(Boolean);
    const ncols=vehicles.length;
    const gridClass=ncols===3?"print-cmp3":"print-cmp2";
    const specVal=(v,key)=>key==="msrp"?v.msrp:(v.specs[key]||"—");

    const heads=vehicles.map(v=>`<div class="print-cmp-head" style="${v.isCurrent?"color:#ffd580!important":""}">${v.isCurrent?"📍 ":""}${v.label}</div>`).join("");

    // Page 1: specs + ratings (all the static data — fits on one landscape page)
    const specRows=SPEC_GROUPS.map(grp=>{
      const hdr=`<div class="print-cmp-section">${grp.group}</div>`;
      const rows=grp.rows.map(sr=>{
        const vals=vehicles.map(v=>specVal(v,sr.key));
        const allSame=vals.every(v=>v===vals[0]);
        return `<div class="print-cmp-label">${sr.label}</div>`+
          vals.map(val=>`<div class="print-cmp-cell${allSame?"":" print-cmp-diff"}">${val}</div>`).join("");
      }).join("");
      return hdr+rows;
    }).join("");

    const ratingRows=VEHICLE_SECTIONS.map(sec=>{
      const vals=vehicles.map(v=>v.isCurrent?null:(ratings[v.id+"|"+sec.id]||0));
      const cells=vals.map(r=>r===null
        ?`<div class="print-cmp-cell print-cmp-note">N/A (current)</div>`
        :`<div class="print-cmp-cell">${r>0?starStr(r):"not rated"}</div>`).join("");
      return`<div class="print-cmp-label">${sec.icon} ${sec.label}</div>${cells}`;
    }).join("");

    const progRow=(()=>{
      const cells=vehicles.map(v=>{
        if(v.isCurrent)return`<div class="print-cmp-cell print-cmp-note">N/A</div>`;
        const p=overallProgress(v.id,checks,VEHICLE_SECTIONS);
        return`<div class="print-cmp-cell">${p.done}/${p.total} (${p.pct}%)</div>`;
      }).join("");
      return`<div class="print-cmp-label">Checklist Progress</div>${cells}`;
    })();

    const decNotes=notes["decision|final"]||"";
    const dateStr=new Date().toLocaleDateString();
    const subLine=`Printed ${dateStr} · Vernon, CT · Andrew Holl${showCurrent?" · Includes: 2016 Volvo XC70":""}`;

    const page1=`<div class="print-page">
      <div class="print-header">
        <div class="print-header-title">Side-by-Side Comparison — Specs &amp; Ratings (Page 1 of 2)</div>
        <div class="print-header-sub">${subLine}</div>
      </div>
      <div class="print-cmp-wrap ${gridClass}">
        <div class="print-cmp-head">Specification</div>${heads}
        ${specRows}
        <div class="print-cmp-section">📊 Your Section Ratings</div>
        ${progRow}
        ${ratingRows}
      </div>
      ${decNotes?`<div style="margin-top:6px;font-size:6.5pt;border:1px solid #ddd;border-radius:3px;padding:4px 7px;"><strong>Decision notes:</strong> ${decNotes}</div>`:""}
    </div>`;

    // Page 2: checklist item comparison (may flow to multiple pages naturally)
    const checkRows=VEHICLE_SECTIONS.map(sec=>{
      const secHdr=`<div class="print-cmp-section" style="background:#edf2ed!important;">${sec.icon} ${sec.label}</div>`;
      const itemRows=sec.items.map(it=>{
        const vals=vehicles.map(v=>v.isCurrent?null:(checks[v.id+"|"+sec.id+"|"+it.id]||false));
        const anyDiff=vals.filter(v=>v!==null).some((v,_,arr)=>v!==arr[0]);
        const cells=vals.map(v=>v===null
          ?`<div class="print-cmp-cell print-cmp-note">N/A</div>`
          :`<div class="print-cmp-cell ${v?"ck":"unc"}${anyDiff?" print-cmp-diff":""}">${v?"✔ Done":"—"}</div>`
        ).join("");
        return`<div class="print-cmp-label">${it.text}</div>${cells}`;
      }).join("");
      const noteRow=(()=>{
        const ns=vehicles.map(v=>v.isCurrent?"N/A":(notes[v.id+"|"+sec.id]||""));
        if(ns.every(n=>!n||n==="N/A"))return"";
        return`<div class="print-cmp-label print-cmp-note">Notes</div>`+
          ns.map(n=>`<div class="print-cmp-cell print-cmp-note">${n||"—"}</div>`).join("");
      })();
      return secHdr+itemRows+noteRow;
    }).join("");

    const page2=`<div class="print-page">
      <div class="print-header">
        <div class="print-header-title">Side-by-Side Comparison — Evaluation Checklist (Page 2 of 2)</div>
        <div class="print-header-sub">${subLine} &nbsp;·&nbsp; <span style="color:#ffd580;">Yellow = answers differ between vehicles</span></div>
      </div>
      <div class="print-cmp-wrap ${gridClass}">
        <div class="print-cmp-head">Checklist Item</div>${heads}
        ${checkRows}
      </div>
    </div>`;

    openPrintWin(`Comparison (${ncols} vehicles) — Car Shopping 2026`,page1+page2);
  };

  // ── Section renderer ─────────────────────────────────────────────────────────
  function renderSections(entity,sectionList,checkMap,setCheckFn,notesMap,setNotesFn,ratingsMap,setRatingsFn){
    return sectionList.map(sec=>{
      const key=entity+"|"+sec.id;
      const isOpen=!!openSections[key];
      const prog=sectionProgress(entity,sec,checkMap);
      const pct=prog.pct;
      return <div key={sec.id} style={{background:"#fff",border:`1px solid ${n100}`,borderRadius:7,marginBottom:8,overflow:"hidden"}}>
        <div onClick={()=>setOpenSections({...openSections,[key]:!isOpen})}
          style={{display:"flex",alignItems:"center",padding:"9px 12px",cursor:"pointer",
            background:isOpen?n50:"#fff",userSelect:"none",gap:7}}>
          <span style={{fontSize:14}}>{sec.icon}</span>
          <span style={{flex:1,fontWeight:700,fontSize:12}}>{sec.label}</span>
          <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,minWidth:40,textAlign:"center",
            background:pct===100?"#d4edda":pct>0?"#fff3cd":n100,
            color:pct===100?G:pct>0?AM:n700}}>{prog.done}/{prog.total}</span>
          <span style={{fontSize:10,color:n300,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.15s"}}>▶</span>
        </div>
        {isOpen&&<>
          {sec.items.map(item=>{
            const ck=checkMap[key+"|"+item.id]||false;
            return <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"8px 12px",borderTop:`1px solid ${n100}`}}>
              <input type="checkbox" style={{marginTop:2,accentColor:G,width:15,height:15,cursor:"pointer",flexShrink:0}}
                checked={ck} onChange={()=>toggleCheck(key+"|"+item.id,setCheckFn,checkMap)}/>
              <span style={{flex:1,fontSize:12,lineHeight:1.4,color:ck?n300:n700,textDecoration:ck?"line-through":"none"}}>{item.text}</span>
            </div>;
          })}
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"5px 12px 8px",borderTop:`1px dashed ${n100}`}}>
            <span style={{fontSize:11,color:n700,fontWeight:600}}>Section rating:</span>
            <StarRating value={ratingsMap[key]||0} onChange={v=>setRating(key,v,setRatingsFn,ratingsMap)}/>
            {ratingsMap[key]>0&&<span style={{fontSize:10,color:n300}}>{["","Poor","Fair","OK","Good","Excellent"][ratingsMap[key]]}</span>}
          </div>
          <div style={{padding:"0 12px 10px 36px"}}>
            <textarea style={{width:"100%",borderRadius:5,border:`1px solid ${n300}`,padding:"5px 8px",
              fontSize:11,resize:"vertical",minHeight:46,fontFamily:"inherit",color:n900}}
              placeholder={`Notes for ${sec.label.toLowerCase()}…`}
              value={notesMap[key]||""}
              onChange={e=>setNote(key,e.target.value,setNotesFn,notesMap)}/>
          </div>
        </>}
      </div>;
    });
  }

  // ── Vehicle Tab ──────────────────────────────────────────────────────────────
  function VehicleTab(){
    const prog=selectedVehicle?overallProgress(selectedVehicle.id,checks,VEHICLE_SECTIONS):null;
    return <>
      <div style={{background:"#eef6f0",border:"1px solid #b2d8bf",borderRadius:6,
        padding:"9px 12px",margin:"8px 12px",fontSize:11,color:"#1a4a2e",lineHeight:1.5}}>
        <strong>How to use:</strong> Select a vehicle, work through sections during the test drive. Check items, rate each section 1–5 ★, and add notes.
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"10px 12px 4px"}}>
        {VEHICLES.map(v=>(
          <button key={v.id} onClick={()=>setSelectedVehicle(v)}
            style={{padding:"5px 11px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap",
              border:`2px solid ${selectedVehicle?.id===v.id?(v.color||G):n300}`,
              background:selectedVehicle?.id===v.id?(v.color||G):"#fff",
              color:selectedVehicle?.id===v.id?"#fff":n700}}>
            {v.label.replace("2026 ","")}
          </button>
        ))}
      </div>
      {!selectedVehicle&&<div style={{padding:36,textAlign:"center",color:n300,fontSize:13}}>← Select a vehicle above to begin</div>}
      {selectedVehicle&&<div style={{padding:"0 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 0 7px"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>{selectedVehicle.label}</div>
            <div style={{fontSize:10,color:n300}}>MSRP {selectedVehicle.msrp} · {prog.done}/{prog.total} evaluated</div>
          </div>
          {progressBar(prog.pct,{flex:1})}
          <div style={{fontSize:11,fontWeight:700,minWidth:32,color:prog.pct===100?G:AM}}>{prog.pct}%</div>
        </div>
        {renderSections(selectedVehicle.id,VEHICLE_SECTIONS,checks,setChecks,notes,setNotes,ratings,setRatings)}
      </div>}
    </>;
  }

  // ── Compare Tab ──────────────────────────────────────────────────────────────
  function CompareTab(){
    // Build columns: always compareA, compareB; optionally CURRENT_VEHICLE
    const cols=[compareA, compareB, showCurrent?CURRENT_VEHICLE:null];
    const activeCols=cols.filter(Boolean);
    const numCols=activeCols.length;

    const chipStyle=(v,selected)=>({
      padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:600,
      border:`2px solid ${selected?.id===v.id?(v.color||G):n300}`,
      background:selected?.id===v.id?(v.color||G):"#fff",
      color:selected?.id===v.id?"#fff":n700,whiteSpace:"nowrap"
    });

    // Spec table header row + data
    const renderSpecRow=(sr,labelWidth)=>{
      const vals=activeCols.map(v=>sr.key==="msrp"?v.msrp:(v.specs[sr.key]||"—"));
      const allSame=vals.every(v=>v===vals[0]);
      return <div key={sr.key} style={{display:"grid",gridTemplateColumns:`${labelWidth} ${"1fr ".repeat(numCols)}`,
        borderTop:`1px solid ${n100}`,background:allSame?"transparent":"#fffbea"}}>
        <div style={{padding:"5px 10px",fontSize:11,color:n700}}>{sr.label}</div>
        {vals.map((val,i)=><div key={i} style={{padding:"5px 8px",fontSize:11,color:n700,
          borderLeft:`1px solid ${n100}`,lineHeight:1.35}}>{val}</div>)}
      </div>;
    };

    const renderCheckSection=(sec)=>{
      return <div key={sec.id} style={{marginBottom:8,border:`1px solid ${n100}`,borderRadius:6,overflow:"hidden"}}>
        <div style={{background:n50,padding:"6px 12px",fontWeight:700,fontSize:11,
          borderBottom:`1px solid ${n100}`,display:"flex",gap:7,alignItems:"center"}}>
          <span>{sec.icon}</span><span>{sec.label}</span>
        </div>
        {sec.items.map(it=>{
          const vals=activeCols.map(v=>v.isCurrent?null:(checks[v.id+"|"+sec.id+"|"+it.id]||false));
          const anyDiff=vals.filter(v=>v!==null).some((v,_,arr)=>v!==arr[0]);
          return <div key={it.id} style={{display:"grid",
            gridTemplateColumns:`1fr ${("64px ").repeat(numCols)}`,
            borderTop:`1px solid ${n100}`,background:anyDiff?"#fffbea":"transparent"}}>
            <div style={{padding:"5px 10px",fontSize:11,color:n700,lineHeight:1.35}}>{it.text}</div>
            {vals.map((v,i)=><div key={i} style={{display:"flex",justifyContent:"center",alignItems:"center",
              borderLeft:`1px solid ${n100}`,fontSize:v===null?11:15,
              color:v===null?n300:v?G:n300}}>{v===null?"—":v?"✔":"—"}</div>)}
          </div>;
        })}
        {/* section notes */}
        {(()=>{
          const ns=activeCols.map(v=>v.isCurrent?"N/A":(notes[v.id+"|"+sec.id]||""));
          if(ns.every(n=>!n||n==="N/A"))return null;
          return <div style={{display:"grid",gridTemplateColumns:`1fr ${("64px ").repeat(numCols)}`,
            borderTop:`1px dashed ${n100}`,background:"#fafaf8"}}>
            <div style={{padding:"4px 10px",fontSize:10,color:n300,fontStyle:"italic"}}>Notes</div>
            {ns.map((n,i)=><div key={i} style={{padding:"4px 6px",fontSize:10,color:n700,
              borderLeft:`1px solid ${n100}`,lineHeight:1.3}}>{n||"—"}</div>)}
          </div>;
        })()}
        {/* section ratings */}
        <div style={{display:"grid",gridTemplateColumns:`1fr ${("64px ").repeat(numCols)}`,
          borderTop:`1px dashed ${n100}`,background:"#fafaf8"}}>
          <div style={{padding:"4px 10px",fontSize:10,color:n700,fontWeight:600}}>My rating</div>
          {activeCols.map((v,i)=>{
            const r=v.isCurrent?0:(ratings[v.id+"|"+sec.id]||0);
            return <div key={i} style={{padding:"3px 6px",borderLeft:`1px solid ${n100}`,
              fontSize:12,color:"#e8a020",textAlign:"center"}}>
              {v.isCurrent?"N/A":r>0?"★".repeat(r):"—"}
            </div>;
          })}
        </div>
      </div>;
    };

    return <>
      <div style={{background:"#eef6f0",border:"1px solid #b2d8bf",borderRadius:6,
        padding:"9px 12px",margin:"8px 12px",fontSize:11,color:"#1a4a2e",lineHeight:1.5}}>
        <strong>Compare:</strong> Select Vehicle A and Vehicle B, then optionally include your current Volvo for context. Differences between vehicles are <span style={{background:"#fffbea",padding:"1px 5px",borderRadius:3,border:"1px solid #e8d88a"}}>highlighted</span>.
        Use <strong>🖨️ Print Compare</strong> in the toolbar to print this comparison.
      </div>

      {/* Vehicle selectors */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"8px 12px"}}>
        {[["A",compareA,setCompareA],["B",compareB,setCompareB]].map(([lbl,sel,setSel])=>(
          <div key={lbl}>
            <div style={{fontSize:11,fontWeight:700,color:n700,marginBottom:5}}>
              Vehicle {lbl} {sel&&<span style={{color:n300,fontWeight:400}}>— {sel.label.replace("2026 ","")}</span>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {VEHICLES.map(v=>(
                <button key={v.id} style={chipStyle(v,sel)}
                  onClick={()=>setSel(sel?.id===v.id?null:v)}>
                  {v.label.replace("2026 ","")}
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Current vehicle toggle */}
      <div style={{padding:"4px 12px 8px",display:"flex",alignItems:"center",gap:9}}>
        <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",
          background:showCurrent?"#fff3cd":"#fff",border:`1.5px solid ${showCurrent?AM:n300}`,
          borderRadius:8,padding:"6px 12px",userSelect:"none"}}>
          <input type="checkbox" checked={showCurrent} onChange={e=>setShowCurrent(e.target.checked)}
            style={{accentColor:AM,width:15,height:15,cursor:"pointer"}}/>
          <span style={{fontSize:11,fontWeight:600,color:showCurrent?AM:n700}}>
            Include my current vehicle: 2016 Volvo XC70 T5 Platinum (200K mi)
          </span>
        </label>
      </div>

      {activeCols.length<2&&<div style={{padding:"28px 12px",textAlign:"center",color:n300,fontSize:13}}>
        Select at least two vehicles above to compare
      </div>}

      {activeCols.length>=2&&<div style={{padding:"0 12px"}}>
        {/* Column headers */}
        <div style={{display:"grid",gridTemplateColumns:`180px ${("1fr ").repeat(numCols)}`,
          background:n900,color:"#fff",borderRadius:"7px 7px 0 0",border:`1px solid ${n900}`,marginBottom:0}}>
          <div style={{padding:"8px 10px",fontWeight:700,fontSize:11}}>Specification / Criterion</div>
          {activeCols.map((v,i)=>(
            <div key={i} style={{padding:"8px 7px",borderLeft:"1px solid rgba(255,255,255,0.15)",
              fontWeight:700,fontSize:10,lineHeight:1.3,
              color:v.isCurrent?"#ffd580":"#fff"}}>
              {v.isCurrent?"📍 Current: ":""}{v.label.replace("2026 ","")}
            </div>
          ))}
        </div>

        {/* Spec groups */}
        {SPEC_GROUPS.map(grp=>(
          <div key={grp.group} style={{border:`1px solid ${n100}`,borderTop:"none"}}>
            <div style={{background:n50,padding:"5px 10px",fontWeight:700,fontSize:11,borderBottom:`1px solid ${n100}`}}>
              {grp.group}
            </div>
            {grp.rows.map(sr=>renderSpecRow(sr,"180px"))}
          </div>
        ))}

        {/* Overall progress */}
        <div style={{border:`1px solid ${n100}`,borderTop:"none",marginBottom:10}}>
          <div style={{background:n50,padding:"5px 10px",fontWeight:700,fontSize:11,borderBottom:`1px solid ${n100}`}}>
            📊 Checklist Progress &amp; Ratings
          </div>
          <div style={{display:"grid",gridTemplateColumns:`180px ${("1fr ").repeat(numCols)}`,
            borderTop:`1px solid ${n100}`}}>
            <div style={{padding:"5px 10px",fontSize:11,color:n700,fontWeight:600}}>Checklist Progress</div>
            {activeCols.map((v,i)=>{
              if(v.isCurrent)return<div key={i} style={{padding:"5px 8px",fontSize:11,color:n300,borderLeft:`1px solid ${n100}`}}>N/A</div>;
              const p=overallProgress(v.id,checks,VEHICLE_SECTIONS);
              return<div key={i} style={{padding:"5px 8px",fontSize:11,fontWeight:700,
                color:p.pct===100?G:AM,borderLeft:`1px solid ${n100}`}}>{p.pct}% ({p.done}/{p.total})</div>;
            })}
          </div>
        </div>

        {/* Checklist sections */}
        {VEHICLE_SECTIONS.map(sec=>renderCheckSection(sec))}

        <div style={{fontSize:10,color:n300,padding:"6px 2px 20px",textAlign:"center"}}>
          ✔ = evaluated &nbsp;·&nbsp; — = not yet evaluated &nbsp;·&nbsp;
          <span style={{background:"#fffbea",padding:"1px 4px",borderRadius:3}}>yellow</span> = vehicles differ
        </div>
      </div>}
    </>;
  }

  // ── Dealer Tab ───────────────────────────────────────────────────────────────
  function DealerTab(){
    const brands=["All",...Array.from(new Set(DEALERS.map(d=>d.brand)))];
    const filtered=brandFilter==="All"?DEALERS:DEALERS.filter(d=>d.brand===brandFilter);
    const prog=selectedDealer?overallProgress(selectedDealer.id,dealerChecks,DEALER_SECTIONS):null;
    const drColor=r=>r==="5.0"?"#d4edda":r==="—"?n100:"#fff3cd";
    const drText=r=>r==="5.0"?G:r==="—"?n700:AM;
    return <>
      <div style={{background:"#eef6f0",border:"1px solid #b2d8bf",borderRadius:6,
        padding:"9px 12px",margin:"8px 12px",fontSize:11,color:"#1a4a2e",lineHeight:1.5}}>
        <strong>How to use:</strong> Filter by brand, select a dealership, and evaluate during your visit.
        DealerRater ratings shown on each chip.
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"8px 12px 2px"}}>
        {brands.map(b=>(
          <button key={b} onClick={()=>setBrandFilter(b)}
            style={{padding:"4px 10px",borderRadius:12,cursor:"pointer",fontSize:11,fontWeight:600,
              border:`1.5px solid ${brandFilter===b?n700:n300}`,
              background:brandFilter===b?n700:"#fff",
              color:brandFilter===b?"#fff":n700}}>{b}</button>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"6px 12px 4px"}}>
        {filtered.map(d=>(
          <button key={d.id} onClick={()=>setSelectedDealer(d)}
            style={{display:"flex",flexDirection:"column",alignItems:"flex-start",padding:"5px 10px",
              borderRadius:8,cursor:"pointer",gap:2,textAlign:"left",
              border:`2px solid ${selectedDealer?.id===d.id?G:n300}`,
              background:selectedDealer?.id===d.id?G:"#fff",
              color:selectedDealer?.id===d.id?"#fff":n700}}>
            <span style={{fontSize:11,fontWeight:700}}>{d.label}</span>
            <span style={{fontSize:9,color:selectedDealer?.id===d.id?"rgba(255,255,255,0.75)":n300}}>
              {d.town} · {d.dist} · DR: {d.drRating} ({d.drReviews})
            </span>
          </button>
        ))}
      </div>
      {!selectedDealer&&<div style={{padding:36,textAlign:"center",color:n300,fontSize:13}}>← Select a dealership above to begin</div>}
      {selectedDealer&&<div style={{padding:"0 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 0 5px"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>{selectedDealer.label}</div>
            <div style={{fontSize:10,color:n300,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:2}}>
              <span>{selectedDealer.dist} from Vernon · {selectedDealer.phone}</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,
                padding:"2px 7px",borderRadius:10,
                background:drColor(selectedDealer.drRating),color:drText(selectedDealer.drRating)}}>
                DR {selectedDealer.drRating} · {selectedDealer.drReviews} reviews
              </span>
            </div>
          </div>
          {progressBar(prog.pct,{flex:1})}
          <div style={{fontSize:11,fontWeight:700,minWidth:32,color:prog.pct===100?G:AM}}>{prog.pct}%</div>
        </div>
        {renderSections(selectedDealer.id,DEALER_SECTIONS,dealerChecks,setDealerChecks,dealerNotes,setDealerNotes,dealerRatings,setDealerRatings)}
        <div style={{background:"#fff",border:`1px solid ${n100}`,borderRadius:7,marginTop:10,overflow:"hidden"}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${n100}`}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>📋 Overall Dealer Notes</div>
            <textarea style={{width:"100%",borderRadius:5,border:`1px solid ${n300}`,padding:"5px 8px",
              fontSize:11,resize:"vertical",minHeight:70,fontFamily:"inherit",color:n900}}
              placeholder="Overall impression, salesperson to work with, pricing notes…"
              value={dealerNotes[selectedDealer.id+"|overall"]||""}
              onChange={e=>setNote(selectedDealer.id+"|overall",e.target.value,setDealerNotes,dealerNotes)}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px 9px"}}>
            <span style={{fontSize:11,color:n700,fontWeight:600}}>Overall dealer rating:</span>
            <StarRating value={dealerRatings[selectedDealer.id+"|overall"]||0}
              onChange={v=>setRating(selectedDealer.id+"|overall",v,setDealerRatings,dealerRatings)}/>
          </div>
        </div>
      </div>}
    </>;
  }

  // ── Summary Tab ──────────────────────────────────────────────────────────────
  function SummaryTab(){
    const vSum=VEHICLES.map(v=>{
      const secRatings=VEHICLE_SECTIONS.map(s=>({label:s.label,icon:s.icon,rating:ratings[v.id+"|"+s.id]||0}));
      const filled=secRatings.filter(r=>r.rating>0);
      const avg=filled.length?(filled.reduce((a,b)=>a+b.rating,0)/filled.length).toFixed(1):"—";
      return {...v,secRatings,avg,prog:overallProgress(v.id,checks,VEHICLE_SECTIONS)};
    });
    const dSum=DEALERS.map(d=>({...d,prog:overallProgress(d.id,dealerChecks,DEALER_SECTIONS),rating:dealerRatings[d.id+"|overall"]||0}));
    return <div style={{padding:"12px 12px 0"}}>
      <div style={{fontWeight:700,fontSize:13,color:n700,marginBottom:8}}>Vehicles</div>
      {vSum.map(v=>{
        const rated=v.secRatings.filter(r=>r.rating>0);
        return <div key={v.id} style={{background:"#fff",border:`1px solid ${n100}`,borderRadius:7,marginBottom:8,padding:"12px 14px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{v.label}</div>
              <div style={{fontSize:10,color:n300,marginBottom:6}}>MSRP {v.msrp} · {v.prog.done}/{v.prog.total} evaluated ({v.prog.pct}%)</div>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                {progressBar(v.prog.pct,{flex:1})}
                <span style={{fontSize:10,fontWeight:700,color:v.prog.pct===100?G:AM}}>{v.prog.pct}%</span>
              </div>
              {rated.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {rated.map(r=><span key={r.label} style={{fontSize:10,background:n100,borderRadius:9,padding:"1px 7px"}}>
                  {r.icon} {"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}
                </span>)}
              </div>}
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontWeight:800,fontSize:20,color:G,lineHeight:1}}>{v.avg}</div>
              <div style={{fontSize:9,color:n300,marginTop:1}}>avg ★</div>
            </div>
          </div>
        </div>;
      })}
      <div style={{fontWeight:700,fontSize:13,color:n700,margin:"14px 0 8px"}}>Dealers</div>
      {dSum.map(d=>(
        <div key={d.id} style={{background:"#fff",border:`1px solid ${n100}`,borderRadius:7,marginBottom:8,padding:"12px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:12}}>{d.label} <span style={{fontWeight:400,color:n300,fontSize:10}}>— {d.town}</span></div>
              <div style={{fontSize:10,color:n300,marginBottom:5,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <span>{d.dist} · {d.phone}</span>
                <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:9,
                  background:d.drRating==="5.0"?"#d4edda":d.drRating==="—"?n100:"#fff3cd",
                  color:d.drRating==="5.0"?G:d.drRating==="—"?n700:AM}}>
                  DR {d.drRating} ({d.drReviews})
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                {progressBar(d.prog.pct,{flex:1})}
                <span style={{fontSize:10,fontWeight:700,color:d.prog.pct===100?G:AM}}>{d.prog.pct}%</span>
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontWeight:800,fontSize:20,color:G,lineHeight:1}}>{d.rating>0?d.rating:"—"}</div>
              <div style={{fontSize:9,color:n300,marginTop:1}}>your ★</div>
            </div>
          </div>
        </div>
      ))}
      <div style={{background:"#eef6f0",border:"1px solid #b2d8bf",borderRadius:6,
        padding:"9px 12px",margin:"14px 0 0",fontSize:11,color:"#1a4a2e",lineHeight:1.5}}>
        <strong>Decision notes:</strong>
        <textarea style={{width:"100%",borderRadius:5,border:"1px solid #b2d8bf",padding:"5px 8px",
          fontSize:11,resize:"vertical",minHeight:80,fontFamily:"inherit",color:n900,marginTop:6}}
          placeholder="Final thoughts, top contenders, deal-breakers, next steps…"
          value={notes["decision|final"]||""}
          onChange={e=>setNote("decision|final",e.target.value,setNotes,notes)}/>
      </div>
    </div>;
  }

  // ── Root render ──────────────────────────────────────────────────────────────
  const tBtn=(variant)=>({
    display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:6,
    border:variant==="primary"?`2px solid ${G}`:variant==="orange"?`2px solid #b45000`:`2px solid ${n300}`,
    background:variant==="primary"?G:variant==="orange"?"#b45000":"#fff",
    color:(variant==="primary"||variant==="orange")?"#fff":n700,
    cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"
  });

  const TABS=[["vehicle","🚗 Vehicles"],["compare","⚖️ Compare"],["dealer","🔧 Dealers"],["summary","📊 Summary"]];

  return <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:n50,minHeight:"100vh",
    color:n900,maxWidth:860,margin:"0 auto",paddingBottom:60}}>

    <div style={{background:n900,color:"#fff",padding:"14px 16px 10px",borderBottom:`3px solid ${G}`}}>
      <p style={{fontSize:15,fontWeight:700,margin:0}}>🚗 Vehicle &amp; Dealer Evaluation Checklist</p>
      <p style={{fontSize:11,color:"#aaa",marginTop:2,marginBottom:0}}>July/August 2026 · Vernon, CT · Andrew Holl · v1.3</p>
    </div>

    <div className="no-print" style={{display:"flex",gap:6,padding:"8px 12px",background:"#fff",
      borderBottom:`1px solid ${n100}`,alignItems:"center",flexWrap:"wrap"}}>
      <button style={tBtn("primary")} onClick={handleSave}>💾 Save JSON</button>
      <button style={tBtn("secondary")} onClick={()=>fileInputRef.current?.click()}>📂 Load JSON</button>
      <input ref={fileInputRef} type="file" accept=".json,application/json" style={{display:"none"}} onChange={handleLoad}/>
      <button style={tBtn("secondary")} onClick={printVehicles}>🖨️ Print Vehicles</button>
      <button style={tBtn("secondary")} onClick={printDealers}>🖨️ Print Dealers</button>
      <button style={tBtn("orange")} onClick={()=>{
        const cols=[compareA,compareB,showCurrent?CURRENT_VEHICLE:null];
        printComparison(cols);
      }}>🖨️ Print Compare</button>
      <span style={{fontSize:10,color:n300,flex:1,textAlign:"right"}}>Save → share → Save to Files</span>
    </div>

    <div className="no-print" style={{display:"flex",background:"#fff",borderBottom:`1px solid ${n300}`,
      position:"sticky",top:0,zIndex:10}}>
      {TABS.map(([id,lbl])=>(
        <button key={id} onClick={()=>setActiveTab(id)}
          style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",fontSize:11,
            background:activeTab===id?G:"transparent",
            color:activeTab===id?"#fff":n700,
            fontWeight:activeTab===id?700:500}}>{lbl}</button>
      ))}
    </div>

    {activeTab==="vehicle" &&<VehicleTab/>}
    {activeTab==="compare" &&<CompareTab/>}
    {activeTab==="dealer"  &&<DealerTab/>}
    {activeTab==="summary" &&<SummaryTab/>}

    {toast&&<div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",
      background:toast.type==="err"?"#c0392b":n900,color:"#fff",
      padding:"9px 18px",borderRadius:22,fontSize:12,fontWeight:600,zIndex:9999,
      boxShadow:"0 4px 16px rgba(0,0,0,0.25)",maxWidth:"90vw",textAlign:"center",
      pointerEvents:"none"}}>{toast.msg}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
