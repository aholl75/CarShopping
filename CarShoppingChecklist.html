<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Vehicle & Dealer Checklist</title>
<style>
  html, body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
  * { box-sizing: border-box; }

  /* ── Print sheet (hidden on screen, shown only when printing) ───────── */
  .print-sheet { display: none; }

  @media print {
    @page {
      size: letter landscape;
      margin: 9mm 10mm;
    }
    .app-screen { display: none !important; }
    .print-sheet { display: block !important; }
    body { background: #fff; }
  }

  .print-sheet {
    font-family: 'Inter', system-ui, sans-serif;
    color: #1c1b18;
  }
  .print-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px solid #1a6b3c;
    padding-bottom: 5px;
    margin-bottom: 6px;
  }
  .print-header h1 {
    font-size: 15pt;
    margin: 0;
  }
  .print-header .print-meta {
    font-size: 9pt;
    color: #555;
  }
  .print-fields {
    font-size: 9pt;
    margin-bottom: 8px;
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
  }
  .print-fields i {
    display: inline-block;
    width: 110px;
    border-bottom: 1px solid #999;
    height: 11px;
    margin-left: 4px;
    vertical-align: -2px;
  }
  .print-columns {
    column-count: 3;
    column-gap: 14px;
  }
  .print-section {
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    margin-bottom: 9px;
  }
  .print-section-title {
    font-weight: 700;
    font-size: 9.5pt;
    background: #eeede9;
    padding: 2px 6px;
    border-radius: 3px;
    margin-bottom: 3px;
  }
  .print-item {
    font-size: 8.3pt;
    line-height: 1.3;
    display: flex;
    gap: 5px;
    margin-bottom: 2px;
    align-items: flex-start;
  }
  .print-box {
    display: inline-block;
    width: 8px;
    height: 8px;
    border: 1.1px solid #333;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .print-section-footer {
    font-size: 7.8pt;
    color: #444;
    margin-top: 3px;
    border-top: 1px dashed #ccc;
    padding-top: 2px;
  }
  .print-overall {
    margin-top: 8px;
    border-top: 2px solid #1a6b3c;
    padding-top: 5px;
    font-size: 9pt;
    break-inside: avoid;
  }
  .print-lines {
    border-bottom: 1px solid #999;
    height: 16px;
    margin-top: 5px;
  }
</style>
</head>
